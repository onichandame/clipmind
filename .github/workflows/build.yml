name: ClipMind Release Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform-label: macOS-AppleSilicon
          - os: macos-latest
            target: x86_64-apple-darwin
            platform-label: macOS-Intel
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform-label: Linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform-label: Windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          toolchain: 1.91

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri App
        # Pinned to v0.5.25 for reproducibility (avoid floating tag drift)
        # No tagName/releaseName here — release is handled by the release job below
        uses: tauri-apps/tauri-action@v0.5.25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_BASE_URL: "https://clipmind.prodream.cn"
          TARGET_TRIPLE: ${{ matrix.target }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true

      - name: Rename and collect artifacts (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p dist
          LABEL="${{ matrix.platform-label }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$BUNDLE_DIR/dmg" -name "*.dmg" | while read f; do
            base=$(basename "$f" .dmg)
            # Strip trailing arch segment (_aarch64 or _x64)
            stem=$(echo "$base" | sed 's/_[^_]*$//')
            cp "$f" "dist/${stem}_${LABEL}.dmg"
          done
          # Updater payload: macOS downloads .app.tar.gz (NOT .dmg) for in-place swap
          find "$BUNDLE_DIR/macos" -name "*.app.tar.gz" -exec cp {} "dist/" \; 2>/dev/null || true
          find "$BUNDLE_DIR/macos" -name "*.app.tar.gz.sig" -exec cp {} "dist/" \; 2>/dev/null || true
          # Per-platform updater manifest (merged later in release job)
          find "$BUNDLE_DIR" -maxdepth 1 -name "latest.json" -exec cp {} "dist/latest-${LABEL}.json" \; 2>/dev/null || true

      - name: Rename and collect artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p dist
          LABEL="${{ matrix.platform-label }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$BUNDLE_DIR/appimage" -name "*.AppImage" | while read f; do
            base=$(basename "$f" .AppImage)
            # Strip trailing arch segment (_amd64)
            stem=$(echo "$base" | sed 's/_[^_]*$//')
            cp "$f" "dist/${stem}_${LABEL}.AppImage"
          done
          # Updater payload sig (AppImage itself doubles as the payload)
          find "$BUNDLE_DIR/appimage" -name "*.AppImage.sig" -exec cp {} "dist/" \; 2>/dev/null || true
          # Per-platform updater manifest (merged later in release job)
          find "$BUNDLE_DIR" -maxdepth 1 -name "latest.json" -exec cp {} "dist/latest-${LABEL}.json" \; 2>/dev/null || true

      - name: Rename and collect artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $label = "${{ matrix.platform-label }}"
          $bundleDir = "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"

          # NSIS installer: ClipMind_x.x.x_x64-setup.exe → ClipMind_x.x.x_Windows-x64-setup.exe
          Get-ChildItem "$bundleDir/nsis" -Filter "*-setup.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            $stem = $_.BaseName -replace '-setup$', '' -replace '_x64$', ''
            Copy-Item $_.FullName "dist/${stem}_${label}-setup.exe"
          }

          # MSI installer: ClipMind_x.x.x_x64_en-US.msi → ClipMind_x.x.x_Windows-x64.msi
          Get-ChildItem "$bundleDir/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            $stem = $_.BaseName -replace '_en-US$', '' -replace '_x64$', ''
            Copy-Item $_.FullName "dist/${stem}_${label}.msi"
          }

          # Updater payload: NSIS .nsis.zip (the inner installer Tauri runs in passive mode) + sig
          Get-ChildItem "$bundleDir/nsis" -Filter "*-setup.nsis.zip" -ErrorAction SilentlyContinue | Copy-Item -Destination "dist/"
          Get-ChildItem "$bundleDir/nsis" -Filter "*-setup.nsis.zip.sig" -ErrorAction SilentlyContinue | Copy-Item -Destination "dist/"

          # Per-platform updater manifest (merged later in release job)
          Get-ChildItem $bundleDir -Filter "latest.json" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "dist/latest-${label}.json"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform-label }}
          path: dist/

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: echo "version=$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      # Each matrix run uploads its own platform-only latest.json. Without
      # merging, the last writer wins and updater fails for all but one
      # platform. Combine them into a single multi-platform manifest.
      - name: Merge per-platform latest.json files
        run: |
          if ls artifacts/latest-*.json >/dev/null 2>&1; then
            jq -s '
              reduce .[] as $m (
                {version: "", notes: "", pub_date: "", platforms: {}};
                .version = $m.version
                | .notes = $m.notes
                | .pub_date = $m.pub_date
                | .platforms = (.platforms + $m.platforms)
              )
            ' artifacts/latest-*.json > artifacts/latest.json
            rm artifacts/latest-*.json
            echo "Merged latest.json:"
            cat artifacts/latest.json
          else
            echo "No per-platform latest.json files found; skipping merge."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ClipMind v${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          files: artifacts/*
          body: |
            Automated release of ClipMind Desktop Client.

            **Download guide:**
            | File | Platform |
            |------|----------|
            | `*_macOS-AppleSilicon.dmg` | macOS on M1 / M2 / M3 / M4 |
            | `*_macOS-Intel.dmg` | macOS on Intel CPU |
            | `*_Windows-x64-setup.exe` | Windows (recommended installer) |
            | `*_Windows-x64.msi` | Windows (MSI package) |
            | `*_Linux-x64.AppImage` | Linux x86-64 |

            **🍎 macOS "App is damaged" error:** macOS Gatekeeper blocks unnotarized apps. Run this in Terminal to bypass:
            ```
            sudo xattr -cr /Applications/ClipMind.app
            ```
