name: ClipMind Release Build
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform-label: macOS-AppleSilicon
          - os: macos-latest
            target: x86_64-apple-darwin
            platform-label: macOS-Intel
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform-label: Linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform-label: Windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          toolchain: 1.91

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf webkit2gtk-driver

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri App
        # Pinned to v0.5.25 for reproducibility (avoid floating tag drift)
        # No tagName/releaseName here — release is handled by the release job below
        uses: tauri-apps/tauri-action@v0.5.25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_BASE_URL: "https://clipmind.prodream.cn"
          TARGET_TRIPLE: ${{ matrix.target }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}

      - name: Rename and collect artifacts (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p dist
          LABEL="${{ matrix.platform-label }}"
          VERSION="$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)"
          BUNDLE_DIR="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$BUNDLE_DIR/dmg" -name "*.dmg" | while read f; do
            base=$(basename "$f" .dmg)
            # Strip trailing arch segment (_aarch64 or _x64)
            stem=$(echo "$base" | sed 's/_[^_]*$//')
            cp "$f" "dist/${stem}_${LABEL}.dmg"
          done
          # Updater payload + signature: macOS downloads .app.tar.gz (NOT .dmg) for in-place swap.
          # Tauri v2 names this "${productName}.app.tar.gz" — NO version, NO arch — so both
          # matrix rows would collide on download-artifact merge. Rename per-row to disambiguate.
          find "$BUNDLE_DIR/macos" -name "*.app.tar.gz" -not -name "*.sig" | while read f; do
            cp "$f" "dist/clipmind_${VERSION}_${LABEL}.app.tar.gz"
          done
          find "$BUNDLE_DIR/macos" -name "*.app.tar.gz.sig" | while read f; do
            cp "$f" "dist/clipmind_${VERSION}_${LABEL}.app.tar.gz.sig"
          done

      - name: Rename and collect artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p dist
          LABEL="${{ matrix.platform-label }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$BUNDLE_DIR/appimage" -name "*.AppImage" | while read f; do
            base=$(basename "$f" .AppImage)
            # Strip trailing arch segment (_amd64)
            stem=$(echo "$base" | sed 's/_[^_]*$//')
            cp "$f" "dist/${stem}_${LABEL}.AppImage"
          done
          # Updater payload sig: rename in lockstep with the .AppImage rename above so
          # the sig basename (minus .sig) matches the asset URL on the release.
          find "$BUNDLE_DIR/appimage" -name "*.AppImage.sig" | while read f; do
            base=$(basename "$f" .AppImage.sig)
            stem=$(echo "$base" | sed 's/_[^_]*$//')
            cp "$f" "dist/${stem}_${LABEL}.AppImage.sig"
          done

      - name: Rename and collect artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $label = "${{ matrix.platform-label }}"
          $bundleDir = "apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"

          # NSIS installer: ClipMind_x.x.x_x64-setup.exe → ClipMind_x.x.x_Windows-x64-setup.exe
          Get-ChildItem "$bundleDir/nsis" -Filter "*-setup.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            $stem = $_.BaseName -replace '-setup$', '' -replace '_x64$', ''
            Copy-Item $_.FullName "dist/${stem}_${label}-setup.exe"
          }

          # MSI installer: ClipMind_x.x.x_x64_en-US.msi → ClipMind_x.x.x_Windows-x64.msi
          Get-ChildItem "$bundleDir/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            $stem = $_.BaseName -replace '_en-US$', '' -replace '_x64$', ''
            Copy-Item $_.FullName "dist/${stem}_${label}.msi"
          }

          # Updater payload: in Tauri v2 with `createUpdaterArtifacts: true` (NOT v1Compatible),
          # the updater payload IS the same -setup.exe as the human installer — no .nsis.zip is
          # produced. Only the .sig file needs separate handling. Rename in lockstep with the .exe
          # rename above so the sig basename (minus .sig) matches the asset URL on the release.
          Get-ChildItem "$bundleDir/nsis" -Filter "*-setup.exe.sig" -ErrorAction SilentlyContinue | ForEach-Object {
            # BaseName = "clipmind_x.x.x_x64-setup.exe" (PS strips one extension, here .sig)
            $stem = $_.BaseName -replace '-setup\.exe$', '' -replace '_x64$', ''
            Copy-Item $_.FullName "dist/${stem}_${label}-setup.exe.sig"
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform-label }}
          path: dist/

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: echo "version=$(jq -r .version apps/desktop/src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      # Hand-author the updater manifest from the .sig files emitted by the
      # Tauri bundler (createUpdaterArtifacts: true). We do NOT rely on
      # tauri-action's includeUpdaterJson because that path is gated on a
      # releaseId we don't provide (we manage the release in this job).
      - name: Build latest.json from sig files
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          BASE="https://github.com/onichandame/clipmind/releases/download/v${VERSION}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n --arg v "$VERSION" --arg pd "$PUB_DATE" \
            '{ version: $v, notes: "", pub_date: $pd, platforms: {} }' \
            > artifacts/latest.json

          shopt -s nullglob
          for sig_file in artifacts/*.sig; do
            payload=$(basename "$sig_file" .sig)
            url="${BASE}/${payload}"
            sig_content=$(cat "$sig_file")

            case "$payload" in
              *_macOS-AppleSilicon.app.tar.gz)  key="darwin-aarch64" ;;
              *_macOS-Intel.app.tar.gz)         key="darwin-x86_64" ;;
              *_Linux-x64.AppImage)             key="linux-x86_64" ;;
              *_Windows-x64-setup.exe)          key="windows-x86_64" ;;
              *) echo "Skipping unrecognized sig: $payload"; continue ;;
            esac

            jq --arg k "$key" --arg s "$sig_content" --arg u "$url" \
              '.platforms[$k] = {signature: $s, url: $u}' \
              artifacts/latest.json > artifacts/latest.json.tmp
            mv artifacts/latest.json.tmp artifacts/latest.json
            echo "Added $key → $url"
          done

          echo "----- latest.json -----"
          cat artifacts/latest.json
          echo "-----------------------"

          # Sanity: every advertised platform must have a non-null, non-empty signature + url.
          # NB: jq's `null != ""` evaluates to true (different types), so a missing key would
          # silently pass a naive check. Use `has()` and `// ""` to guard explicitly.
          for k in darwin-aarch64 darwin-x86_64 linux-x86_64 windows-x86_64; do
            jq -e --arg k "$k" '
              (.platforms | has($k))
              and ((.platforms[$k].signature // "") != "")
              and ((.platforms[$k].url // "") != "")
            ' artifacts/latest.json >/dev/null \
              || { echo "ERROR: $k slot missing or incomplete in latest.json"; exit 1; }
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ClipMind v${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          files: artifacts/*
          body: |
            Automated release of ClipMind Desktop Client.

            **Download guide:**
            | File | Platform |
            |------|----------|
            | `*_macOS-AppleSilicon.dmg` | macOS on M1 / M2 / M3 / M4 |
            | `*_macOS-Intel.dmg` | macOS on Intel CPU |
            | `*_Windows-x64-setup.exe` | Windows (recommended installer) |
            | `*_Windows-x64.msi` | Windows (MSI package) |
            | `*_Linux-x64.AppImage` | Linux x86-64 |

            **🍎 macOS "App is damaged" error:** macOS Gatekeeper blocks unnotarized apps. Run this in Terminal to bypass:
            ```
            sudo xattr -cr /Applications/ClipMind.app
            ```
